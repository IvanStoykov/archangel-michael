# atomic-llama-cpp-turboquant — Gemma 4 26B (stability-first f16-base)
PROFILE_NAME=llama-gemma-26b
AUDIT_MODE=agent
HERMES_EXTRA_ARGS="-Q --max-turns 200"
HERMES_PROVIDER=custom
HERMES_MODEL=gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
HERMES_BASE_URL=http://127.0.0.1:8080/v1
API_HEALTH_URL=http://127.0.0.1:8080/v1/models
# Server CTX=16384; Hermes agent requires config >= 65536 (see README)
HERMES_CONTEXT_LENGTH=65536
BACKEND_PORT=8080
LLAMA_ROOT=/home/ivan/git/atomic-llama-cpp-turboquant
LLAMA_MODE=f16-base
# Partial GPU if OOM: export NGL=50 before start_backend.sh
NGL="${NGL:-40}"
CTX="${CTX:-8192}"
MAIN_GGUF_CHECK="${LLAMA_ROOT}/gemma-4-26b-a4b/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"
MAIN_GGUF_ALT="${LLAMA_ROOT}/.scratch/gemma-4-26b-a4b/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"
BACKEND_START_CMD='cd "${LLAMA_ROOT}" && export MAIN_GGUF="${MAIN_GGUF:-${MAIN_GGUF_CHECK:-${LLAMA_ROOT}/gemma-4-26b-a4b/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf}}" && CTX="${CTX:-16384}" NGL="${NGL:-99}" PORT=8080 exec ./scripts/run-gemma4.sh "${LLAMA_MODE:-f16-base}"'
BACKEND_STOP_PATTERN="llama-server.*--port 8080"
