# atomic-llama-cpp-turboquant — Gemma 4 E4B (turbo3 KV)
PROFILE_NAME=llama-gemma-e4b
HERMES_PROVIDER=custom
HERMES_MODEL=gemma-4-E4B-it-Q4_K_M.gguf
HERMES_BASE_URL=http://127.0.0.1:8080/v1
API_HEALTH_URL=http://127.0.0.1:8080/v1/models
HERMES_CONTEXT_LENGTH=65536
BACKEND_PORT=8080
LLAMA_ROOT=/home/ivan/git/atomic-llama-cpp-turboquant
# f16 only on 12GB — avoid turbo3 for audits
CTX=8192
NGL=99
MAIN_GGUF_CHECK="${LLAMA_ROOT}/.scratch/gemma-4-e4b/gemma-4-E4B-it-Q4_K_M.gguf"
BACKEND_START_CMD='cd "${LLAMA_ROOT}" && MAIN_GGUF="${MAIN_GGUF:-${MAIN_GGUF_CHECK}}" CTX=8192 CTK=f16 CTV=f16 PORT=8080 exec ./scripts/run-gemma4-e4b-server.sh'
BACKEND_STOP_PATTERN="llama-server.*--port 8080"
