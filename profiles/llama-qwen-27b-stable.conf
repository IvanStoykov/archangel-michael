# DEFAULT — atomic-llama-cpp-turboquant Qwen 3.6 27B (stable, no turbo3 crash)
PROFILE_NAME=llama-qwen-27b-stable
AUDIT_MODE=agent
HERMES_PROVIDER=custom
HERMES_MODEL=Qwen3.6-27B-Q4_K_M.gguf
HERMES_BASE_URL=http://127.0.0.1:8080/v1
API_HEALTH_URL=http://127.0.0.1:8080/v1/models
# Hermes Agent requires >=64K in config; llama-server CTX=32768 (real limit).
# On overflow Hermes parses the 400 and steps down + compresses.
HERMES_CONTEXT_LENGTH=65536
SERVER_CTX=32768
BACKEND_PORT=8080
LLAMA_ROOT=/home/ivan/git/atomic-llama-cpp-turboquant
MAIN_GGUF=/home/ivan/models/Qwen3.6-27B-MTP/Qwen3.6-27B-Q4_K_M.gguf
MAIN_GGUF_CHECK="${MAIN_GGUF}"
CTX=32768
NGL=14
KV_CACHE=f16
LLAMA_FIT=on
FIT_TARGET=1536
BACKEND_START_CMD='exec /home/ivan/git/hermes-overnight-audits/scripts/atomic-serve-qwen27-stable.sh'
BACKEND_STOP_PATTERN="llama-server.*--port 8080"
HERMES_EXTRA_ARGS="-Q --max-turns 200"
WAIT_SEC=300
